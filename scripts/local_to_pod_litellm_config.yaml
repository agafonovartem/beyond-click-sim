# Local litellm proxy: routes requests across each pod's forwarded litellm proxy.
# Current batch: port_forward.sh with BASE_PORT=8001 → pods agent-exp-0..7 on 8001-8008.
model_list:
  - model_name: Qwen/Qwen3.6-27B
